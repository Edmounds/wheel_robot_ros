# 最小 Nav2 配置：用于二轮车 + 2D 激光雷达 + Cartographer 虚拟 odom。
# 目标是室内低速 A/B 点导航，优先保证能跑通和方便调参。

# 地图服务器：给 Nav2 发布静态栅格地图。
# yaml_filename 在 launch 中通过 map:=xxx.yaml 覆盖。
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

# 全局规划器：根据静态地图从当前位置规划到目标点。
# 当前使用 Navfn，稳定、依赖少；今晚先不强制上 Theta*。
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0  # 规划频率，低速车 5Hz 足够。
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.3       # 目标点附近 0.3m 内有可达点也接受。
      use_astar: false     # false 为 Dijkstra 风格；想更直接可改 true。
      allow_unknown: false # 不允许穿过未知区域，更保守。

# 控制器：跟踪全局路径并输出 /cmd_vel。
# 这里使用 DWB，适合差速/二轮底盘，参数调试相对直观。
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0       # 控制循环频率。
    min_x_velocity_threshold: 0.02    # 小于该线速度认为是 0，过滤抖动。
    min_y_velocity_threshold: 0.5     # 二轮车不能横移，设大一点避免 y 方向噪声。
    min_theta_velocity_threshold: 0.02
    failure_tolerance: 0.3            # 短时间控制失败容忍，避免轻微卡顿就失败。
    odom_topic: /odom                 # DWB 默认需要 odom 话题；若只有 TF 无话题再补桥接。
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # 进度检查：判断机器人是不是卡住了。
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.08  # 12 秒内至少移动 8cm，否则认为没进展。
      movement_time_allowance: 12.0

    # 到点判定：一晚调参不要卡太死，先允许 18cm 和约 20 度角度误差。
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.18
      yaw_goal_tolerance: 0.35

    # DWB 局部规划器：采样多组速度，选择代价最低的一组输出。
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false

      # 速度限制：今晚先低速调通。方向不对或晃动时先看这里。
      min_vel_x: 0.0      # 不倒车；需要倒车再设为负数。
      min_vel_y: 0.0      # 二轮车无横移。
      max_vel_x: 0.22     # 最大线速度 m/s。
      max_vel_y: 0.0
      max_vel_theta: 0.7  # 最大角速度 rad/s。
      min_speed_xy: 0.0
      max_speed_xy: 0.22
      min_speed_theta: 0.0

      # 加速度限制：太大容易冲，太小会跟不上路径。
      acc_lim_x: 0.45
      acc_lim_y: 0.0
      acc_lim_theta: 1.0
      decel_lim_x: -0.45
      decel_lim_y: 0.0
      decel_lim_theta: -1.0

      # 采样数量：越大越细但更耗 CPU；小车低速先保守。
      vx_samples: 12
      vy_samples: 1
      vtheta_samples: 20

      # 轨迹预测时间：越长越提前避障，但也更保守。
      sim_time: 1.2
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.3
      xy_goal_tolerance: 0.18
      trans_stopped_velocity: 0.04
      short_circuit_trajectory_evaluation: true
      stateful: true

      # critic 是 DWB 的轨迹打分项。路径贴合、目标靠近、避障、到点旋转都在这里权衡。
      critics:
        [
          "RotateToGoal",
          "Oscillation",
          "BaseObstacle",
          "GoalAlign",
          "PathAlign",
          "PathDist",
          "GoalDist",
        ]
      BaseObstacle.scale: 0.04
      PathAlign.scale: 24.0
      PathAlign.forward_point_distance: 0.15
      GoalAlign.scale: 18.0
      GoalAlign.forward_point_distance: 0.15
      PathDist.scale: 24.0
      GoalDist.scale: 18.0
      RotateToGoal.scale: 20.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

# 局部代价地图：机器人附近滚动窗口，用于实时避障。
# global_frame 用 odom，避免局部避障被 map 全局修正影响。
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3           # 局部窗口宽度 m。
      height: 3          # 局部窗口高度 m。
      resolution: 0.05   # 栅格分辨率 m。
      robot_radius: 0.22 # 机器人半径；按真实外接圆半径改。
      plugins: ["obstacle_layer", "inflation_layer"]

      # 障碍层：只使用 2D 激光 /scan。
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0   # 清除自由空间的最大距离。
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5   # 认为是障碍的最大距离。
          obstacle_min_range: 0.0

      # 膨胀层：给障碍物周围扩安全距离。
      # 车容易蹭障碍就增大 inflation_radius；绕太远就减小。
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.45
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

# 全局代价地图：基于静态地图规划长路径，同时叠加激光看到的障碍。
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: false # 未知区域不单独跟踪；配合 allow_unknown=false 更保守。
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # 静态地图层：来自 map_server。
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      # 全局障碍层：让新出现的障碍也影响全局规划。
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      # 全局膨胀层：和局部膨胀保持一致，路径会更保守。
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.45
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

# 行为树导航器：接收 RViz 的目标点，串起规划、控制和基础行为。
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"

# 行为服务器：这里只保留 wait，避免恢复行为过激。
# 如果后面需要原地旋转/后退恢复，再加 spin/back_up。
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 5.0
    behavior_plugins: ["wait"]
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.3

# 生命周期管理器：自动把 Nav2 节点 configure/activate。
# node_names 必须和上面启动的节点名一致。
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      [
        "map_server",
        "planner_server",
        "controller_server",
        "behavior_server",
        "bt_navigator",
      ]
