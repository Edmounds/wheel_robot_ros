# 最小 Nav2 配置：用于二轮车 + 2D 激光雷达 + Cartographer 虚拟 odom。
# 目标是室内低速 A/B 点导航，优先保证能跑通和方便调参。

# 地图服务器：给 Nav2 发布静态栅格地图。
# yaml_filename 在 launch 中通过 map:=xxx.yaml 覆盖。
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

# 全局规划器：根据静态地图从当前位置规划到目标点。
# 使用 Theta*，路径比网格 A*/Dijkstra 更接近任意角度直线路径。
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0  # 规划频率，低速车 5Hz 足够。
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_theta_star_planner/ThetaStarPlanner"
      how_many_corners: 8
      w_euc_cost: 1.0
      w_traversal_cost: 2.0
      allow_unknown: false
      use_final_approach_orientation: true

# 控制器：跟踪全局路径并输出 /cmd_vel。
# 仿真验证使用 Regulated Pure Pursuit，减少 DWB 采样对局部代价地图噪声的敏感性。
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0       # 控制循环频率。
    min_x_velocity_threshold: 0.02    # 小于该线速度认为是 0，过滤抖动。
    min_y_velocity_threshold: 0.5     # 二轮车不能横移，设大一点避免 y 方向噪声。
    min_theta_velocity_threshold: 0.02
    failure_tolerance: 0.3            # 短时间控制失败容忍，避免轻微卡顿就失败。
    odom_topic: /odom                 # DWB 默认需要 odom 话题；若只有 TF 无话题再补桥接。
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # 进度检查：判断机器人是不是卡住了。
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.08  # 12 秒内至少移动 8cm，否则认为没进展。
      movement_time_allowance: 12.0

    # 到点判定：一晚调参不要卡太死，先允许 18cm 和约 20 度角度误差。
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.18
      yaw_goal_tolerance: 0.35

    # Regulated Pure Pursuit：跟踪 Theta* 全局路径，适合低速差速底盘验证。
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.16
      lookahead_dist: 0.35
      min_lookahead_dist: 0.20
      max_lookahead_dist: 0.55
      lookahead_time: 1.0
      use_velocity_scaled_lookahead_dist: false
      rotate_to_heading_angular_vel: 0.45
      max_angular_accel: 1.0
      transform_tolerance: 0.3
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      allow_reversing: false
      min_approach_linear_velocity: 0.04
      approach_velocity_scaling_dist: 0.35
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.45
      regulated_linear_scaling_min_speed: 0.05
      use_cost_regulated_linear_velocity_scaling: false
      use_collision_detection: false

# 局部代价地图：机器人附近滚动窗口，用于实时避障。
# global_frame 用 odom，避免局部避障被 map 全局修正影响。
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3           # 局部窗口宽度 m。
      height: 3          # 局部窗口高度 m。
      resolution: 0.05   # 栅格分辨率 m。
      robot_radius: 0.22 # 机器人半径；按真实外接圆半径改。
      plugins: ["obstacle_layer", "inflation_layer"]

      # 障碍层：只使用 2D 激光 /scan。
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0   # 清除自由空间的最大距离。
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5   # 认为是障碍的最大距离。
          obstacle_min_range: 0.0

      # 膨胀层：给障碍物周围扩安全距离。
      # 车容易蹭障碍就增大 inflation_radius；绕太远就减小。
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.25
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

# 全局代价地图：基于静态地图规划长路径，同时叠加激光看到的障碍。
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: false # 未知区域不单独跟踪；配合 allow_unknown=false 更保守。
      plugins: ["static_layer", "inflation_layer"]

      # 静态地图层：来自 map_server。
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      # 全局膨胀层：全局规划只基于静态地图；实时激光避障留给局部 costmap。
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.25
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

# 行为树导航器：接收 RViz 的目标点，串起规划、控制和基础行为。
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"

# 行为服务器：默认 Nav2 行为树会调用 spin/back_up/wait。
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 5.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.3

# 生命周期管理器：自动把 Nav2 节点 configure/activate。
# node_names 必须和上面启动的节点名一致。
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      [
        "map_server",
        "planner_server",
        "controller_server",
        "behavior_server",
        "bt_navigator",
      ]
